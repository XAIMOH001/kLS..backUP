<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order — Drinks POS</title>
    <link rel="stylesheet" href="/global.css">
    <link rel="stylesheet" href="/order.css">
</head>
<body>
    <div class="container">
        <div class="header fade-in">
            <h1>Select your location</h1>
            <p>Choose a branch to view availability.</p>
        </div>

        <div id="view-order">
            <h3 class="section-title fade-in" style="animation-delay: 0.1s">1. Branch</h3>
            <div class="branch-grid fade-in" id="branches" style="animation-delay: 0.15s"></div>

            <div id="drinks-section" class="hidden" style="margin-top: 40px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3 class="section-title" style="margin-bottom: 0;">2. Drinks Selection</h3>
                    <button id="hq-restock-btn" class="primary outline hidden" onclick="openRestockModal()" style="padding: 6px 12px; font-size: 0.85rem; border: 1px solid var(--primary); color: var(--primary); background: transparent; border-radius: var(--radius-sm); cursor: pointer;">+ Restock Branches</button>
                </div>
                <div class="drinks-grid" id="drinks"></div>
            </div>

            <div id="form-section" class="hidden" style="margin-top: 40px;">
                <h3 class="section-title">3. Delivery Details</h3>
                <div class="glass form-container fade-in" style="padding: 24px; border-radius: var(--radius);">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="customer-name" placeholder="Required" autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="tel" id="customer-phone" placeholder="Optional" autocomplete="off">
                        </div>
                    </div>
                    
                    <div class="input-group" style="margin-top: 24px;">
                        <label>Quantity</label>
                        <div class="stepper">
                            <button onclick="updateQty(-1)">−</button>
                            <span id="qty">1</span>
                            <button onclick="updateQty(1)">+</button>
                        </div>
                    </div>

                    <div class="checkout-bar">
                        <div>
                            <div style="color: var(--text-muted); font-size: 0.85rem; font-weight: 500; text-transform: uppercase;">Total</div>
                            <div class="total-amt">KES <span id="total-display">0.00</span></div>
                        </div>
                        <button class="primary" id="submit-btn" onclick="placeOrder()" disabled>Place Order</button>
                    </div>
                    <div id="error-banner" class="msg-banner error" style="display: none;"></div>
                </div>
            </div>
        </div>

        <div id="view-receipt" class="receipt fade-in hidden">
            <div class="receipt-icon">✓</div>
            <h2>Order Complete</h2>
            <div class="r-grid">
                <div>
                    <div class="r-label">Order Reference</div>
                    <div class="r-val" id="r-id"></div>
                </div>
                <div>
                    <div class="r-label">Total Amount</div>
                    <div class="r-val" style="color: var(--success)">KES <span id="r-total"></span></div>
                </div>
                <div>
                    <div class="r-label">Drink</div>
                    <div class="r-val" id="r-drink"></div>
                </div>
                <div>
                    <div class="r-label">Branch</div>
                    <div class="r-val" id="r-branch"></div>
                </div>
            </div>
            <div id="r-warning" class="msg-banner warning hidden">⚠ Low stock alert for the selected location.</div>
            <button class="primary" style="width: 100%; max-width: 300px;" onclick="resetOrder()">Place New Order</button>
        </div>

        <!-- Restock Modal -->
        <div class="modal-overlay" id="restock-modal">
            <div class="modal">
                <div class="modal-head">
                    <span>HQ Stock Transfer</span>
                    <button onclick="closeRestockModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="input-group" style="display: flex; flex-direction: column; gap: 8px;">
                        <label>Destination Location</label>
                        <select id="restock-branch"></select>
                    </div>
                    <div class="input-group" style="display: flex; flex-direction: column; gap: 8px;">
                        <label>Drink Availability (HQ)</label>
                        <select id="restock-drink"></select>
                    </div>
                    <div class="input-group" style="display: flex; flex-direction: column; gap: 8px;">
                        <label>Transfer Volume</label>
                        <input type="number" id="restock-qty" min="1" value="10">
                    </div>
                    <div id="restock-error" style="color: var(--danger); font-size: 0.9rem; font-weight: 500; display: none;"></div>
                    <div id="restock-success" style="color: var(--success); font-size: 0.9rem; font-weight: 500; display: none;">Transfer complete!</div>
                </div>
                <div class="modal-foot">
                    <button class="outline" onclick="closeRestockModal()" style="padding: 8px 16px; border: 1px solid var(--border); background: transparent; color: #fff; border-radius: var(--radius-sm); cursor: pointer;">Cancel</button>
                    <button class="primary outline" style="background: var(--text); color: var(--bg); padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; border: none;" onclick="submitRestock()">Transfer Stock</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let state = { branches: [], drinks: [], selectedBranch: null, selectedDrink: null, qty: 1 };

        async function init() {
            try {
                const res = await fetch('/api/branches');
                state.branches = await res.json();
                renderBranches();
            } catch (e) { console.error(e); }
            document.getElementById('customer-name').addEventListener('input', checkSubmitState);
        }

        function renderBranches() {
            const container = document.getElementById('branches');
            container.innerHTML = state.branches.map((b, i) => `
                <button class="card-btn ${state.selectedBranch?.id === b.id ? 'active' : ''}" 
                        onclick="selectBranch(${b.id})">
                    <div style="font-weight: 600; color: #fff; font-size: 1.05rem;">${b.name}</div>
                    <div style="color: var(--text-muted); font-size: 0.85rem; margin-top: 2px;">${b.city}</div>
                </button>
            `).join('');
        }

        async function selectBranch(id) {
            state.selectedBranch = state.branches.find(b => b.id === id);
            state.selectedDrink = null; state.qty = 1;
            renderBranches();
            
            const btn = document.getElementById('hq-restock-btn');
            if (id === 1 && btn) {
                btn.classList.remove('hidden');
            } else if (btn) {
                btn.classList.add('hidden');
            }

            const ds = document.getElementById('drinks-section');
            ds.classList.remove('hidden'); ds.classList.add('fade-in');
            document.getElementById('form-section').classList.add('hidden');
            
            const res = await fetch(`/api/drinks?branch_id=${id}`);
            state.drinks = await res.json();
            renderDrinks();
            updateTotal(); checkSubmitState();
        }

        function renderDrinks() {
            const container = document.getElementById('drinks');
            container.innerHTML = state.drinks.map((d, i) => {
                const imgName = d.name.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g, '');
                const bgImage = `/images/drinks/${imgName}.jpg`;
                return `
                <button class="card-btn drink-card fade-in ${state.selectedDrink?.id === d.id ? 'active' : ''}"
                     style="animation-delay: ${i * 0.05}s; background-image: url('${bgImage}')"
                     ${d.quantity === 0 ? 'disabled' : ''}
                     onclick="selectDrink(${d.id})">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <div class="d-name">${d.name}</div>
                            <div class="d-brand">${d.brand}</div>
                        </div>
                        <div class="d-price">KES ${d.price}</div>
                    </div>
                    <div class="d-meta">
                        <span class="badge qty">${d.quantity} units</span>
                        ${d.low && d.quantity > 0 ? '<span class="badge low">LOW</span>' : ''}
                        ${d.quantity === 0 ? '<span class="badge out">OUT</span>' : ''}
                    </div>
                </button>
                `;
            }).join('');
        }

        function selectDrink(id) {
            state.selectedDrink = state.drinks.find(d => d.id === id);
            state.qty = 1;
            renderDrinks();
            const fs = document.getElementById('form-section');
            fs.classList.remove('hidden'); fs.classList.add('fade-in');
            updateTotal(); checkSubmitState();
            fs.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function updateQty(delta) {
            if (!state.selectedDrink) return;
            const limit = state.selectedDrink.quantity;
            if (state.qty + delta >= 1 && state.qty + delta <= limit) {
                state.qty += delta;
                updateTotal();
            }
        }

        function updateTotal() {
            document.getElementById('qty').innerText = state.qty;
            if (state.selectedDrink) {
                document.getElementById('total-display').innerText = (state.selectedDrink.price * state.qty).toFixed(2);
            }
        }

        function checkSubmitState() {
            const name = document.getElementById('customer-name').value.trim();
            document.getElementById('submit-btn').disabled = !(name && state.selectedBranch && state.selectedDrink);
        }

        async function placeOrder() {
            const btn = document.getElementById('submit-btn');
            const err = document.getElementById('error-banner');
            btn.disabled = true; btn.innerText = 'Processing...'; err.style.display = 'none';

            const payload = {
                customer_name: document.getElementById('customer-name').value.trim(),
                customer_phone: document.getElementById('customer-phone').value.trim(),
                branch_id: state.selectedBranch.id,
                drink_id: state.selectedDrink.id,
                quantity: state.qty
            };

            try {
                const res = await fetch('/api/orders', { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                showReceipt(data);
            } catch (e) {
                err.innerText = e.message || 'Network error.';
                err.style.display = 'block';
                btn.disabled = false; btn.innerText = 'Place Order';
            }
        }

        function showReceipt(data) {
            document.getElementById('view-order').classList.add('hidden');
            const r = document.getElementById('view-receipt');
            r.classList.remove('hidden');
            
            document.getElementById('r-id').innerText = '#' + data.order_id;
            document.getElementById('r-total').innerText = data.total.toFixed(2);
            document.getElementById('r-drink').innerText = `${state.qty}x ${state.selectedDrink.name}`;
            document.getElementById('r-branch').innerText = state.selectedBranch.name;
            
            const w = document.getElementById('r-warning');
            data.low_stock ? w.classList.remove('hidden') : w.classList.add('hidden');
        }

        function resetOrder() {
            document.getElementById('view-receipt').classList.add('hidden');
            document.getElementById('view-order').classList.remove('hidden');
            selectBranch(state.selectedBranch.id); // re-fetch stock
            document.getElementById('submit-btn').innerText = 'Place Order';
        }

        async function openRestockModal() {
            document.getElementById('restock-modal').style.display = 'flex';
            document.getElementById('restock-error').style.display = 'none';
            document.getElementById('restock-success').style.display = 'none';
            document.getElementById('restock-qty').value = 10;
            
            document.getElementById('restock-branch').innerHTML = state.branches
                .filter(b => b.id !== 1)
                .map(b => `<option value="${b.id}">${b.name}</option>`)
                .join('');
            
            document.getElementById('restock-drink').innerHTML = state.drinks.map(d => 
                `<option value="${d.id}">${d.name} (${d.quantity} HQ Storage)</option>`
            ).join('');
        }

        function closeRestockModal() { 
            document.getElementById('restock-modal').style.display = 'none'; 
            selectBranch(1);
        }

        async function submitRestock() {
            const payload = {
                branch_id: parseInt(document.getElementById('restock-branch').value),
                drink_id: parseInt(document.getElementById('restock-drink').value),
                quantity: parseInt(document.getElementById('restock-qty').value)
            };
            const err = document.getElementById('restock-error');
            const succ = document.getElementById('restock-success');
            err.style.display = 'none';
            succ.style.display = 'none';
            
            if (!payload.quantity || payload.quantity < 1) {
                err.innerText = "Invalid volume"; err.style.display = 'block'; return;
            }
            try {
                const res = await fetch('/api/restock', { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.error) { 
                    err.innerText = data.error; 
                    err.style.display = 'block'; 
                } else { 
                    succ.style.display = 'block';
                    const dr = state.drinks.find(d => d.id === payload.drink_id);
                    if (dr) dr.quantity -= payload.quantity;
                    document.getElementById('restock-drink').innerHTML = state.drinks.map(d => 
                        `<option value="${d.id}">${d.name} (${d.quantity} HQ Storage)</option>`
                    ).join('');
                    setTimeout(closeRestockModal, 1000);
                }
            } catch (e) { 
                err.innerText = "Network issue."; 
                err.style.display = 'block'; 
            }
        }

        init();
    </script>
</body>
</html>
